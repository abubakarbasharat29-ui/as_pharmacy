<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AS Pharmacy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="auth-logo-icon">
                    <i class="fa-solid fa-briefcase-medical"></i>
                </div>
                <div class="auth-logo-text">AS Pharmacy</div>
            </div>
            <div class="auth-header">
                <h2 class="auth-title">Welcome Back</h2>
                <p class="auth-subtitle">Sign in to your pharmacy account</p>
            </div>
            <form id="loginForm">
                <div id="loginError" style="color: var(--danger); font-size: 0.85rem; margin-bottom: 1rem; display: none; text-align: center;">
                    <i class="fa-solid fa-circle-exclamation"></i> <span>Invalid email or password</span>
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope input-icon"></i>
                        <input type="email" id="email" class="form-control" placeholder="you@aspharmacy.com" required>
                    </div>
                </div>
                <div class="form-group" style="margin-bottom: 0.75rem;">
                    <label class="form-label">Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                        <button type="button" class="input-toggle" onclick="togglePassword()">
                            <i class="fa-solid fa-eye" id="passwordIcon"></i>
                        </button>
                    </div>
                </div>
                <div style="text-align:right; margin-bottom: 1.5rem;">
                    <a href="forgot-password.html" class="auth-link" style="font-size: 0.82rem; color: var(--text-muted);">
                        <i class="fa-solid fa-key"></i> Forgot Password?
                    </a>
                </div>
                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <span>Sign In</span>
                    <i class="fa-solid fa-right-to-bracket"></i>
                </button>
            </form>
            <div class="auth-footer">
                Don't have an account? <a href="signup.html" class="auth-link">Create one</a>
            </div>
            <div style="text-align: center; margin-top: 0.75rem;">
                <a href="admin-login.html" class="auth-link" style="font-size: 0.8rem; color: var(--text-muted);">
                    <i class="fa-solid fa-user-shield"></i> Admin Login
                </a>
            </div>
        </div>
    </div>
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/components.js"></script>
    <script>
        (async () => {
            await Storage.init();
            const user = Storage.getCurrentUser();
            if (user) {
                window.location.href = user.role === 'admin' ? 'admin.html' : 'dashboard.html';
            }
        })();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Signing in...';
            const email    = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const result   = await Storage.login(email, password);
            if (result.success) {
                window.location.href = 'dashboard.html';
            } else {
                const err = document.getElementById('loginError');
                err.style.display = 'block';
                err.querySelector('span').innerText = result.message || 'Invalid email or password';
                btn.disabled = false;
                btn.innerHTML = '<span>Sign In</span><i class="fa-solid fa-right-to-bracket"></i>';
            }
        });

        function togglePassword() {
            const input = document.getElementById('password');
            const icon  = document.getElementById('passwordIcon');
            input.type  = input.type === 'password' ? 'text' : 'password';
            icon.className = input.type === 'password' ? 'fa-solid fa-eye' : 'fa-solid fa-eye-slash';
        }
    </script>
<!-- COOKIES BANNER -->
<div id="cookieBanner" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#0f172a;border-top:1px solid #1e293b;padding:1.25rem 2rem;box-shadow:0 -4px 30px rgba(0,0,0,0.3);">
    <div style="max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:2rem;flex-wrap:wrap;">
        <div style="display:flex;align-items:center;gap:1rem;flex:1;min-width:250px;">
            <div style="width:40px;height:40px;background:rgba(16,185,129,0.1);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <i class="fa-solid fa-cookie-bite" style="color:#10b981;font-size:1.1rem;"></i>
            </div>
            <div>
                <p style="color:white;font-size:0.9rem;font-weight:600;margin:0 0 0.2rem;">We use cookies</p>
                <p style="color:#94a3b8;font-size:0.8rem;margin:0;">AS Pharmacy uses cookies to enhance your experience and keep you logged in securely.</p>
            </div>
        </div>
        <div style="display:flex;gap:0.75rem;flex-shrink:0;">
            <button onclick="declineCookies()" style="padding:0.6rem 1.25rem;border:1px solid #334155;background:transparent;color:#94a3b8;border-radius:8px;cursor:pointer;font-size:0.85rem;font-weight:500;">Decline</button>
            <button onclick="acceptCookies()" style="padding:0.6rem 1.5rem;border:none;background:#10b981;color:white;border-radius:8px;cursor:pointer;font-size:0.85rem;font-weight:600;">
                <i class="fa-solid fa-check" style="margin-right:0.4rem;"></i> Accept All Cookies
            </button>
        </div>
    </div>
</div>
<script>
(function() {
    if (!localStorage.getItem('cookieConsent')) {
        setTimeout(() => { document.getElementById('cookieBanner').style.display = 'block'; }, 1000);
    }
})();
function acceptCookies() { localStorage.setItem('cookieConsent','accepted'); hideBanner(); }
function declineCookies() { localStorage.setItem('cookieConsent','declined'); hideBanner(); }
function hideBanner() {
    const b = document.getElementById('cookieBanner');
    b.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
    b.style.transform = 'translateY(100%)';
    b.style.opacity = '0';
    setTimeout(() => b.style.display = 'none', 300);
}
</script>
</body>
</html>
