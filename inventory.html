<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory - AS Pharmacy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="app-container">
        <div class="main-wrapper">
            <main class="content-area">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <div>
                        <h2 style="font-size: 1.5rem;">Medicine Inventory</h2>
                        <p style="color: var(--text-muted); font-size: 0.95rem;">Manage and track your medicine stock</p>
                    </div>
                    <button class="btn btn-primary" onclick="openMedModal()">
                        <i class="fa-solid fa-plus"></i> Add Medicine
                    </button>
                </div>

                <div class="card" style="padding: 0; overflow: hidden;">
                    <div style="padding: 1.5rem; border-bottom: 1px solid var(--border); display: flex; gap: 1rem;">
                        <div class="input-wrapper" style="flex: 1;">
                            <i class="fa-solid fa-search input-icon"></i>
                            <input type="text" id="searchInput" class="form-control" placeholder="Search by name, company, or category..." oninput="loadMeds()">
                        </div>
                        <select id="categoryFilter" class="form-control" style="width: 200px; padding-left: 1rem;" onchange="loadMeds()">
                            <option value="">All Categories</option>
                            <option>Analgesic</option><option>Antibiotic</option><option>Antacid</option><option>Vitamin</option><option>Other</option>
                        </select>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Medicine Name</th><th>Category</th><th>Company</th>
                                    <th>Price</th><th>Stock</th><th>Expiry</th><th>Status</th><th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="medsTableBody">
                                <tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--text-light);">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="pagination">
                        <div class="pagination-info">
                            Showing <span id="pageStart">0</span>–<span id="pageEnd">0</span> of <span id="totalItems">0</span> items
                        </div>
                        <div class="pagination-btns">
                            <button class="page-btn" onclick="changePage(-1)" id="prevBtn"><i class="fa-solid fa-chevron-left"></i> Previous</button>
                            <button class="page-btn" onclick="changePage(1)" id="nextBtn">Next <i class="fa-solid fa-chevron-right"></i></button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Medicine Modal -->
    <div id="medModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;padding:2rem;">
        <div class="card" style="width:100%;max-width:600px;box-shadow:var(--shadow-lg);">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;">
                <h3 id="modalTitle">Add Medicine</h3>
                <button onclick="closeMedModal()" style="background:none;border:none;cursor:pointer;color:var(--text-muted);"><i class="fa-solid fa-xmark fa-xl"></i></button>
            </div>
            <form id="medForm">
                <input type="hidden" id="medId">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;">
                    <div class="form-group" style="grid-column:span 2;">
                        <label class="form-label">Medicine Name</label>
                        <input type="text" id="medName" class="form-control" style="padding-left:1rem;" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Category</label>
                        <select id="medCategory" class="form-control" style="padding-left:1rem;">
                            <option>Analgesic</option><option>Antibiotic</option><option>Antacid</option><option>Vitamin</option><option>Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Manufacturer</label>
                        <input type="text" id="medCompany" class="form-control" style="padding-left:1rem;" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Price (Rs.)</label>
                        <input type="number" id="medPrice" class="form-control" style="padding-left:1rem;" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Stock Quantity</label>
                        <input type="number" id="medQty" class="form-control" style="padding-left:1rem;" required>
                    </div>
                    <div class="form-group" style="grid-column:span 2;">
                        <label class="form-label">Expiry Date</label>
                        <input type="date" id="medExpiry" class="form-control" style="padding-left:1rem;" required>
                    </div>
                </div>
                <div style="display:flex;gap:1rem;margin-top:2rem;">
                    <button type="button" class="btn btn-outline" style="flex:1;" onclick="closeMedModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary" style="flex:1;" id="medSaveBtn">Save Medicine</button>
                </div>
            </form>
        </div>
    </div>

    <script src="assets/js/storage.js"></script>
    <script src="assets/js/components.js"></script>
    <script>
        let currentPage = 1;
        const itemsPerPage = 10;
        let filteredItems = [];
        let highlightId = null;

        document.addEventListener('DOMContentLoaded', async () => {
            await Storage.init();
const user = Storage.getCurrentUser();
if (!user) { window.location.replace('index.html'); return; }
window.addEventListener('pageshow', function(event) {
    if (event.persisted) {
        const u = Storage.getCurrentUser();
        if (!u) window.location.replace('index.html');
    }
});
            await Components.renderSidebar('inventory');
            await Components.renderTopbar('Inventory Management');

            const urlParams = new URLSearchParams(window.location.search);
            highlightId = parseInt(urlParams.get('highlight')) || null;

            await loadMeds();
        });

        async function loadMeds() {
            const search   = document.getElementById('searchInput').value;
            const category = document.getElementById('categoryFilter').value;
            filteredItems  = await Storage.fetch(DB.MEDS);

            // Client-side filter
            filteredItems = filteredItems.filter(m => {
                const s = search.toLowerCase();
                const matchSearch = !s || m.name.toLowerCase().includes(s) || m.company.toLowerCase().includes(s) || m.category.toLowerCase().includes(s);
                const matchCat = !category || m.category === category;
                return matchSearch && matchCat;
            });

            currentPage = 1;
            renderMeds();
        }

        function renderMeds() {
            const start = (currentPage - 1) * itemsPerPage;
            const end   = start + itemsPerPage;
            const page  = filteredItems.slice(start, end);

            document.getElementById('medsTableBody').innerHTML = page.map(m => {
                const isLow = m.qty < 10;
                return `
                    <tr class="${m.id === highlightId ? 'highlight-row' : ''}">
                        <td><strong>${m.name}</strong></td>
                        <td><span class="badge" style="background:var(--surface-alt);color:var(--text-muted);">${m.category}</span></td>
                        <td>${m.company}</td>
                        <td>Rs. ${m.price}</td>
                        <td style="font-weight:600;color:${isLow ? 'var(--danger)' : 'inherit'}">${m.qty}</td>
                        <td>${m.expiry}</td>
                        <td>${isLow ? '<span class="badge badge-warning">Low Stock</span>' : '<span class="badge badge-success">In Stock</span>'}</td>
                        <td>
                            <div style="display:flex;gap:0.5rem;">
                                <button class="action-btn" onclick="editMed(${m.id})" title="Edit"><i class="fa-solid fa-pen-to-square"></i></button>
                                <button class="action-btn" onclick="deleteMed(${m.id})" title="Delete" style="color:var(--danger);"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </td>
                    </tr>`;
            }).join('');

            document.getElementById('pageStart').innerText = filteredItems.length > 0 ? start + 1 : 0;
            document.getElementById('pageEnd').innerText   = Math.min(end, filteredItems.length);
            document.getElementById('totalItems').innerText = filteredItems.length;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = end >= filteredItems.length;

            if (highlightId) {
                setTimeout(() => {
                    const row = document.querySelector('.highlight-row');
                    if (row) row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 300);
            }
        }

        function changePage(dir) { currentPage += dir; renderMeds(); }

        function openMedModal(id = null) {
            const form = document.getElementById('medForm');
            if (id) {
                const med = filteredItems.find(m => m.id === id) || {};
                document.getElementById('medId').value       = med.id;
                document.getElementById('medName').value     = med.name;
                document.getElementById('medCategory').value = med.category;
                document.getElementById('medCompany').value  = med.company;
                document.getElementById('medPrice').value    = med.price;
                document.getElementById('medQty').value      = med.qty;
                document.getElementById('medExpiry').value   = med.expiry;
                document.getElementById('modalTitle').innerText = 'Edit Medicine';
            } else {
                form.reset();
                document.getElementById('medId').value = '';
                document.getElementById('modalTitle').innerText = 'Add Medicine';
            }
            document.getElementById('medModal').style.display = 'flex';
        }

        function closeMedModal() { document.getElementById('medModal').style.display = 'none'; }

        document.getElementById('medForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('medSaveBtn');
            btn.disabled = true; btn.innerText = 'Saving...';

            const id = document.getElementById('medId').value;
            const data = {
                name:     document.getElementById('medName').value,
                category: document.getElementById('medCategory').value,
                company:  document.getElementById('medCompany').value,
                price:    parseFloat(document.getElementById('medPrice').value),
                qty:      parseInt(document.getElementById('medQty').value),
                expiry:   document.getElementById('medExpiry').value
            };

            if (id) {
                await Storage.update(DB.MEDS, parseInt(id), data);
            } else {
                await Storage.add(DB.MEDS, data);
            }

            closeMedModal();
            await loadMeds();
            btn.disabled = false; btn.innerText = 'Save Medicine';
        });

        function editMed(id) { openMedModal(id); }

        async function deleteMed(id) {
            if (confirm('Are you sure you want to delete this medicine?')) {
                await Storage.delete(DB.MEDS, id);
                await loadMeds();
            }
        }
    </script>
    <!-- COOKIES BANNER -->
<div id="cookieBanner" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#0f172a;border-top:1px solid #1e293b;padding:1.25rem 2rem;box-shadow:0 -4px 30px rgba(0,0,0,0.3);">
    <div style="max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:2rem;flex-wrap:wrap;">
        <div style="display:flex;align-items:center;gap:1rem;flex:1;min-width:250px;">
            <div style="width:40px;height:40px;background:rgba(16,185,129,0.1);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <i class="fa-solid fa-cookie-bite" style="color:#10b981;font-size:1.1rem;"></i>
            </div>
            <div>
                <p style="color:white;font-size:0.9rem;font-weight:600;margin:0 0 0.2rem;">We use cookies</p>
                <p style="color:#94a3b8;font-size:0.8rem;margin:0;">AS Pharmacy uses cookies to enhance your experience and keep you logged in securely.</p>
            </div>
        </div>
        <div style="display:flex;gap:0.75rem;flex-shrink:0;">
            <button onclick="declineCookies()" style="padding:0.6rem 1.25rem;border:1px solid #334155;background:transparent;color:#94a3b8;border-radius:8px;cursor:pointer;font-size:0.85rem;font-weight:500;">Decline</button>
            <button onclick="acceptCookies()" style="padding:0.6rem 1.5rem;border:none;background:#10b981;color:white;border-radius:8px;cursor:pointer;font-size:0.85rem;font-weight:600;">
                <i class="fa-solid fa-check" style="margin-right:0.4rem;"></i> Accept All Cookies
            </button>
        </div>
    </div>
</div>
<script>
(function() {
    if (!localStorage.getItem('cookieConsent')) {
        setTimeout(() => { document.getElementById('cookieBanner').style.display = 'block'; }, 1000);
    }
})();
function acceptCookies() { localStorage.setItem('cookieConsent','accepted'); hideBanner(); }
function declineCookies() { localStorage.setItem('cookieConsent','declined'); hideBanner(); }
function hideBanner() {
    const b = document.getElementById('cookieBanner');
    b.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
    b.style.transform = 'translateY(100%)';
    b.style.opacity = '0';
    setTimeout(() => b.style.display = 'none', 300);
}
</script>
</body>
</html>
