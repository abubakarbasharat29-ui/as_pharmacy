<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - AS Pharmacy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="auth-logo-icon"><i class="fa-solid fa-briefcase-medical"></i></div>
                <div class="auth-logo-text">AS Pharmacy</div>
            </div>
            <div id="step1">
                <div class="auth-header">
                    <h2 class="auth-title">Forgot Password</h2>
                    <p class="auth-subtitle">Enter your email and date of birth to verify</p>
                </div>
                <div id="step1Error" style="color:var(--danger);font-size:0.85rem;margin-bottom:1rem;display:none;text-align:center;background:rgba(239,68,68,0.08);padding:0.75rem;border-radius:8px;">
                    <i class="fa-solid fa-circle-exclamation"></i> <span></span>
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope input-icon"></i>
                        <input type="email" id="resetEmail" class="form-control" placeholder="your@email.com" required>
                    </div>
                </div>
                <div class="form-group" style="margin-bottom:2rem;">
                    <label class="form-label">Date of Birth</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-calendar input-icon"></i>
                        <input type="date" id="resetDob" class="form-control" required>
                    </div>
                </div>
                <button class="btn btn-primary" id="verifyBtn" onclick="verifyIdentity()">
                    <span>Verify Identity</span>
                    <i class="fa-solid fa-shield-halved"></i>
                </button>
            </div>
            <div id="step2" style="display:none;">
                <div class="auth-header">
                    <h2 class="auth-title">Reset Password</h2>
                    <p class="auth-subtitle">Create a new password for your account</p>
                </div>
                <div id="step2Error" style="color:var(--danger);font-size:0.85rem;margin-bottom:1rem;display:none;text-align:center;background:rgba(239,68,68,0.08);padding:0.75rem;border-radius:8px;">
                    <i class="fa-solid fa-circle-exclamation"></i> <span></span>
                </div>
                <div id="step2Success" style="color:#10b981;font-size:0.85rem;margin-bottom:1rem;display:none;text-align:center;background:rgba(16,185,129,0.08);padding:0.75rem;border-radius:8px;">
                    <i class="fa-solid fa-circle-check"></i> <span></span>
                </div>
                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="newPassword" class="form-control" placeholder="Min. 6 characters" required minlength="6">
                        <button type="button" class="input-toggle" onclick="togglePass('newPassword','eyeIcon1')">
                            <i class="fa-solid fa-eye" id="eyeIcon1"></i>
                        </button>
                    </div>
                </div>
                <div class="form-group" style="margin-bottom:2rem;">
                    <label class="form-label">Confirm New Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-shield-halved input-icon"></i>
                        <input type="password" id="confirmPassword" class="form-control" placeholder="Repeat password" required>
                        <button type="button" class="input-toggle" onclick="togglePass('confirmPassword','eyeIcon2')">
                            <i class="fa-solid fa-eye" id="eyeIcon2"></i>
                        </button>
                    </div>
                </div>
                <button class="btn btn-primary" id="resetBtn" onclick="resetPassword()">
                    <span>Reset Password</span>
                    <i class="fa-solid fa-key"></i>
                </button>
            </div>
            <div style="margin-top:1.5rem;text-align:center;">
                <a href="login.html" class="auth-link" style="font-size:0.85rem;color:var(--text-muted);">
                    <i class="fa-solid fa-arrow-left"></i> Back to Login
                </a>
            </div>
        </div>
    </div>
    <script>
        const API = 'api/auth.php';

        async function verifyIdentity() {
            const email = document.getElementById('resetEmail').value.trim();
            const dob   = document.getElementById('resetDob').value;
            if (!email || !dob) { showError('step1Error', 'Please fill all fields'); return; }
            const btn = document.getElementById('verifyBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Verifying...';
            try {
                const res  = await fetch(API + '?action=verify_identity', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, dob })
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('step1').style.display = 'none';
                    document.getElementById('step2').style.display = 'block';
                } else {
                    showError('step1Error', data.message || 'Verification failed');
                    btn.disabled = false;
                    btn.innerHTML = '<span>Verify Identity</span><i class="fa-solid fa-shield-halved"></i>';
                }
            } catch(e) {
                showError('step1Error', 'Connection error. Please try again.');
                btn.disabled = false;
                btn.innerHTML = '<span>Verify Identity</span><i class="fa-solid fa-shield-halved"></i>';
            }
        }

        async function resetPassword() {
            const email    = document.getElementById('resetEmail').value.trim();
            const password = document.getElementById('newPassword').value;
            const confirm  = document.getElementById('confirmPassword').value;
            if (password.length < 6) { showError('step2Error', 'Password must be at least 6 characters'); return; }
            if (password !== confirm) { showError('step2Error', 'Passwords do not match'); return; }
            const btn = document.getElementById('resetBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Resetting...';
            try {
                const res  = await fetch(API + '?action=reset_password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('step2Error').style.display = 'none';
                    document.getElementById('step2Success').style.display = 'block';
                    document.getElementById('step2Success').querySelector('span').innerText = 'Password reset successfully! Redirecting...';
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    showError('step2Error', data.message || 'Reset failed');
                    btn.disabled = false;
                    btn.innerHTML = '<span>Reset Password</span><i class="fa-solid fa-key"></i>';
                }
            } catch(e) {
                showError('step2Error', 'Connection error. Please try again.');
                btn.disabled = false;
                btn.innerHTML = '<span>Reset Password</span><i class="fa-solid fa-key"></i>';
            }
        }

        function showError(id, msg) {
            const el = document.getElementById(id);
            el.style.display = 'block';
            el.querySelector('span').innerText = msg;
        }

        function togglePass(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon  = document.getElementById(iconId);
            input.type  = input.type === 'password' ? 'text' : 'password';
            icon.className = input.type === 'password' ? 'fa-solid fa-eye' : 'fa-solid fa-eye-slash';
        }
    </script>
    <!-- COOKIES BANNER -->
<div id="cookieBanner" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#0f172a;border-top:1px solid #1e293b;padding:1.25rem 2rem;box-shadow:0 -4px 30px rgba(0,0,0,0.3);">
    <div style="max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:2rem;flex-wrap:wrap;">
        <div style="display:flex;align-items:center;gap:1rem;flex:1;min-width:250px;">
            <div style="width:40px;height:40px;background:rgba(16,185,129,0.1);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <i class="fa-solid fa-cookie-bite" style="color:#10b981;font-size:1.1rem;"></i>
            </div>
            <div>
                <p style="color:white;font-size:0.9rem;font-weight:600;margin:0 0 0.2rem;">We use cookies</p>
                <p style="color:#94a3b8;font-size:0.8rem;margin:0;">AS Pharmacy uses cookies to enhance your experience and keep you logged in securely.</p>
            </div>
        </div>
        <div style="display:flex;gap:0.75rem;flex-shrink:0;">
            <button onclick="declineCookies()" style="padding:0.6rem 1.25rem;border:1px solid #334155;background:transparent;color:#94a3b8;border-radius:8px;cursor:pointer;font-size:0.85rem;font-weight:500;">Decline</button>
            <button onclick="acceptCookies()" style="padding:0.6rem 1.5rem;border:none;background:#10b981;color:white;border-radius:8px;cursor:pointer;font-size:0.85rem;font-weight:600;">
                <i class="fa-solid fa-check" style="margin-right:0.4rem;"></i> Accept All Cookies
            </button>
        </div>
    </div>
</div>
<script>
(function() {
    if (!localStorage.getItem('cookieConsent')) {
        setTimeout(() => { document.getElementById('cookieBanner').style.display = 'block'; }, 1000);
    }
})();
function acceptCookies() { localStorage.setItem('cookieConsent','accepted'); hideBanner(); }
function declineCookies() { localStorage.setItem('cookieConsent','declined'); hideBanner(); }
function hideBanner() {
    const b = document.getElementById('cookieBanner');
    b.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
    b.style.transform = 'translateY(100%)';
    b.style.opacity = '0';
    setTimeout(() => b.style.display = 'none', 300);
}
</script>
</body>
</html>
