<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - AS Pharmacy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="auth-logo-icon"><i class="fa-solid fa-briefcase-medical"></i></div>
                <div class="auth-logo-text">AS Pharmacy</div>
            </div>
            <div class="auth-header">
                <h2 class="auth-title">Create Account</h2>
                <p class="auth-subtitle">Join us to manage your pharmacy efficiently</p>
            </div>
            <form id="signupForm">
                <div id="signupError" style="color: var(--danger); font-size: 0.85rem; margin-bottom: 1rem; display: none; text-align: center; background: rgba(239,68,68,0.08); padding: 0.75rem; border-radius: 8px;">
                    <i class="fa-solid fa-circle-exclamation"></i> <span></span>
                </div>
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label class="form-label">Full Name</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-user input-icon"></i>
                            <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-envelope input-icon"></i>
                            <input type="email" id="email" class="form-control" placeholder="name@company.com" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Phone Number</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-phone input-icon"></i>
                            <input type="tel" id="phone" class="form-control" placeholder="+92 300 1234567" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Date of Birth</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-calendar input-icon"></i>
                            <input type="date" id="dob" class="form-control" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock input-icon"></i>
                            <input type="password" id="password" class="form-control" placeholder="Min. 6 characters" required minlength="6">
                        </div>
                    </div>
                    <div class="form-group full-width" style="margin-bottom: 1.5rem;">
                        <label class="form-label">Confirm Password</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-shield-halved input-icon"></i>
                            <input type="password" id="confirmPassword" class="form-control" placeholder="Repeat password" required>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" id="signupBtn">
                    <span>Create Account</span>
                    <i class="fa-solid fa-user-plus"></i>
                </button>
            </form>
            <div class="auth-footer">
                Already have an account? <a href="login.html" class="auth-link">Sign In</a>
            </div>
        </div>
    </div>

    <script src="assets/js/storage.js"></script>
    <script src="assets/js/components.js"></script>
    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm  = document.getElementById('confirmPassword').value;

            if (password !== confirm) {
                showError('Passwords do not match');
                return;
            }

            const btn = document.getElementById('signupBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Creating...';

            const result = await _api('auth.php', 'POST', {
                name:     document.getElementById('name').value,
                email:    document.getElementById('email').value,
                phone:    document.getElementById('phone').value,
                dob:      document.getElementById('dob').value,
                password: password
            }, { action: 'register' });

            if (result.success) {
                alert('Account created successfully! Please login.');
                window.location.href = 'login.html';
            } else {
                showError(result.message || 'Registration failed');
                btn.disabled = false;
                btn.innerHTML = '<span>Create Account</span><i class="fa-solid fa-user-plus"></i>';
            }
        });

        function showError(msg) {
            const err = document.getElementById('signupError');
            err.style.display = 'block';
            err.querySelector('span').innerText = msg;
        }
    </script>
    <!-- COOKIES BANNER -->
<div id="cookieBanner" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#0f172a;border-top:1px solid #1e293b;padding:1.25rem 2rem;box-shadow:0 -4px 30px rgba(0,0,0,0.3);">
    <div style="max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:2rem;flex-wrap:wrap;">
        <div style="display:flex;align-items:center;gap:1rem;flex:1;min-width:250px;">
            <div style="width:40px;height:40px;background:rgba(16,185,129,0.1);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <i class="fa-solid fa-cookie-bite" style="color:#10b981;font-size:1.1rem;"></i>
            </div>
            <div>
                <p style="color:white;font-size:0.9rem;font-weight:600;margin:0 0 0.2rem;">We use cookies</p>
                <p style="color:#94a3b8;font-size:0.8rem;margin:0;">AS Pharmacy uses cookies to enhance your experience and keep you logged in securely.</p>
            </div>
        </div>
        <div style="display:flex;gap:0.75rem;flex-shrink:0;">
            <button onclick="declineCookies()" style="padding:0.6rem 1.25rem;border:1px solid #334155;background:transparent;color:#94a3b8;border-radius:8px;cursor:pointer;font-size:0.85rem;font-weight:500;">Decline</button>
            <button onclick="acceptCookies()" style="padding:0.6rem 1.5rem;border:none;background:#10b981;color:white;border-radius:8px;cursor:pointer;font-size:0.85rem;font-weight:600;">
                <i class="fa-solid fa-check" style="margin-right:0.4rem;"></i> Accept All Cookies
            </button>
        </div>
    </div>
</div>
<script>
(function() {
    if (!localStorage.getItem('cookieConsent')) {
        setTimeout(() => { document.getElementById('cookieBanner').style.display = 'block'; }, 1000);
    }
})();
function acceptCookies() { localStorage.setItem('cookieConsent','accepted'); hideBanner(); }
function declineCookies() { localStorage.setItem('cookieConsent','declined'); hideBanner(); }
function hideBanner() {
    const b = document.getElementById('cookieBanner');
    b.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
    b.style.transform = 'translateY(100%)';
    b.style.opacity = '0';
    setTimeout(() => b.style.display = 'none', 300);
}
</script>
</body>
</html>
