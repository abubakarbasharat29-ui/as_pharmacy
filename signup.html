<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - AS Pharmacy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="auth-logo-icon"><i class="fa-solid fa-briefcase-medical"></i></div>
                <div class="auth-logo-text">AS Pharmacy</div>
            </div>
            <div class="auth-header">
                <h2 class="auth-title">Create Account</h2>
                <p class="auth-subtitle">Join us to manage your pharmacy efficiently</p>
            </div>
            <form id="signupForm">
                <div id="signupError" style="color:var(--danger);font-size:0.85rem;margin-bottom:1rem;display:none;text-align:center;background:rgba(239,68,68,0.08);padding:0.75rem;border-radius:8px;">
                    <i class="fa-solid fa-circle-exclamation"></i> <span></span>
                </div>
                <div id="signupSuccess" style="color:#10b981;font-size:0.85rem;margin-bottom:1rem;display:none;text-align:center;background:rgba(16,185,129,0.08);padding:0.75rem;border-radius:8px;">
                    <i class="fa-solid fa-circle-check"></i> <span></span>
                </div>

                <div class="form-grid">
                    <!-- Full Name -->
                    <div class="form-group full-width">
                        <label class="form-label">Full Name</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-user input-icon"></i>
                            <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="form-group full-width">
                        <label class="form-label">Email Address</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-envelope input-icon"></i>
                            <input type="email" id="email" class="form-control" placeholder="name@company.com" required>
                        </div>
                    </div>

                    <!-- Phone -->
                    <div class="form-group">
                        <label class="form-label">Phone Number</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-phone input-icon"></i>
                            <input type="tel" id="phone" class="form-control" placeholder="+92 300 1234567" required>
                        </div>
                    </div>

                    <!-- Date of Birth -->
                    <div class="form-group">
                        <label class="form-label">Date of Birth</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-calendar input-icon"></i>
                            <input type="date" id="dob" class="form-control" required>
                        </div>
                    </div>

                    <!-- Gender -->
                    <div class="form-group">
                        <label class="form-label">Gender</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-venus-mars input-icon"></i>
                            <select id="gender" class="form-control" style="padding-left:2.5rem;" required>
                                <option value="">Select Gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                                <option value="Prefer not to say">Prefer not to say</option>
                            </select>
                        </div>
                    </div>

                    <!-- Country -->
                    <div class="form-group">
                        <label class="form-label">Country</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-globe input-icon"></i>
                            <select id="country" class="form-control" style="padding-left:2.5rem;" required>
                                <option value="">Select Country</option>
                                <option value="Pakistan">Pakistan</option>
                                <option value="Afghanistan">Afghanistan</option>
                                <option value="Bangladesh">Bangladesh</option>
                                <option value="Canada">Canada</option>
                                <option value="China">China</option>
                                <option value="Egypt">Egypt</option>
                                <option value="France">France</option>
                                <option value="Germany">Germany</option>
                                <option value="India">India</option>
                                <option value="Indonesia">Indonesia</option>
                                <option value="Iran">Iran</option>
                                <option value="Iraq">Iraq</option>
                                <option value="Italy">Italy</option>
                                <option value="Japan">Japan</option>
                                <option value="Jordan">Jordan</option>
                                <option value="Kuwait">Kuwait</option>
                                <option value="Malaysia">Malaysia</option>
                                <option value="Morocco">Morocco</option>
                                <option value="Nigeria">Nigeria</option>
                                <option value="Oman">Oman</option>
                                <option value="Qatar">Qatar</option>
                                <option value="Saudi Arabia">Saudi Arabia</option>
                                <option value="South Africa">South Africa</option>
                                <option value="Spain">Spain</option>
                                <option value="Sri Lanka">Sri Lanka</option>
                                <option value="Turkey">Turkey</option>
                                <option value="UAE">UAE</option>
                                <option value="UK">UK</option>
                                <option value="USA">USA</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock input-icon"></i>
                            <input type="password" id="password" class="form-control" placeholder="Min. 8 characters" required minlength="8">
                            <button type="button" class="input-toggle" onclick="togglePass('password','eye1')">
                                <i class="fa-solid fa-eye" id="eye1"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Confirm Password -->
                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-shield-halved input-icon"></i>
                            <input type="password" id="confirmPassword" class="form-control" placeholder="Repeat password" required>
                            <button type="button" class="input-toggle" onclick="togglePass('confirmPassword','eye2')">
                                <i class="fa-solid fa-eye" id="eye2"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Math CAPTCHA -->
                    <div class="form-group full-width">
                        <label class="form-label">
                            <i class="fa-solid fa-robot" style="color:var(--accent);margin-right:0.4rem;"></i>
                            Security Check
                        </label>
                        <div style="display:flex;align-items:center;gap:1rem;">
                            <div style="background:var(--surface-alt);border:1px solid var(--border);border-radius:var(--radius-md);padding:0.75rem 1.25rem;font-size:1.1rem;font-weight:700;color:var(--accent);min-width:120px;text-align:center;">
                                <span id="captchaQuestion">Loading...</span>
                            </div>
                            <div class="input-wrapper" style="flex:1;">
                                <i class="fa-solid fa-equals input-icon"></i>
                                <input type="number" id="captchaAnswer" class="form-control" placeholder="Your answer" required>
                            </div>
                            <button type="button" onclick="generateCaptcha()" style="background:none;border:1px solid var(--border);border-radius:var(--radius-md);padding:0.75rem;cursor:pointer;color:var(--text-muted);transition:all 0.2s;" title="Refresh CAPTCHA">
                                <i class="fa-solid fa-rotate-right"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" id="signupBtn" style="margin-top:0.5rem;">
                    <span>Create Account</span>
                    <i class="fa-solid fa-user-plus"></i>
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html" class="auth-link">Sign In</a>
            </div>

            <!-- Back to Home -->
            <div style="text-align:center;margin-top:0.75rem;">
                <a href="index.html" class="auth-link" style="font-size:0.85rem;color:var(--text-muted);">
                    <i class="fa-solid fa-arrow-left"></i> Back to Home
                </a>
            </div>
        </div>
    </div>

    <script src="assets/js/storage.js"></script>
    <script src="assets/js/components.js"></script>
    <script>
        const RESERVED = ['admin','administrator','root','superuser','moderator','system','support'];
        let captchaAnswer = 0;

        // Generate Math CAPTCHA
        function generateCaptcha() {
            const ops = ['+', '-', '*'];
            const op  = ops[Math.floor(Math.random() * ops.length)];
            let a, b;
            if (op === '+') { a = Math.floor(Math.random() * 20) + 1; b = Math.floor(Math.random() * 20) + 1; captchaAnswer = a + b; }
            if (op === '-') { a = Math.floor(Math.random() * 20) + 10; b = Math.floor(Math.random() * 10) + 1; captchaAnswer = a - b; }
            if (op === '*') { a = Math.floor(Math.random() * 9)  + 1; b = Math.floor(Math.random() * 9)  + 1; captchaAnswer = a * b; }
            document.getElementById('captchaQuestion').innerText = a + ' ' + op + ' ' + b + ' = ?';
            document.getElementById('captchaAnswer').value = '';
        }

        generateCaptcha();

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name     = document.getElementById('name').value.trim();
            const email    = document.getElementById('email').value.trim();
            const phone    = document.getElementById('phone').value.trim();
            const dob      = document.getElementById('dob').value;
            const gender   = document.getElementById('gender').value;
            const country  = document.getElementById('country').value;
            const password = document.getElementById('password').value;
            const confirm  = document.getElementById('confirmPassword').value;
            const captcha  = parseInt(document.getElementById('captchaAnswer').value);

            // Validation 1: Name must start with letter
            if (!/^[a-zA-Z]/.test(name)) {
                showError('Name must start with a letter. Example: Kashif123'); return;
            }

            // Validation 2: No special characters
            if (!/^[a-zA-Z][a-zA-Z0-9 ]*$/.test(name)) {
                showError('Name cannot contain special characters like @, #, ! etc.'); return;
            }

            // Validation 3: Reserved names
            if (RESERVED.includes(name.toLowerCase().trim())) {
                showError('"' + name + '" is a reserved name. Please use a different name.'); return;
            }

            // Validation 4: Email format
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showError('Please enter a valid email address.'); return;
            }

            // Validation 5: Gender
            if (!gender) { showError('Please select your gender.'); return; }

            // Validation 6: Country
            if (!country) { showError('Please select your country.'); return; }

            // Validation 7: Password min 8 characters
            if (password.length < 8) {
                showError('Password must be at least 8 characters long.'); return;
            }

            // Validation 8: Password match
            if (password !== confirm) {
                showError('Passwords do not match. Please try again.'); return;
            }

            // Validation 9: CAPTCHA
            if (isNaN(captcha) || captcha !== captchaAnswer) {
                showError('Security check failed! Please solve the math problem correctly.');
                generateCaptcha();
                return;
            }

            const btn = document.getElementById('signupBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Creating...';

            try {
                const res = await fetch('api/auth.php?action=register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, phone, dob, gender, country, password })
                });
                const result = await res.json();

                if (result.success) {
                    document.getElementById('signupError').style.display   = 'none';
                    document.getElementById('signupSuccess').style.display = 'block';
                    document.getElementById('signupSuccess').querySelector('span').innerText = 'Account created! Redirecting to login...';
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    showError(result.message || 'Registration failed.');
                    btn.disabled = false;
                    btn.innerHTML = '<span>Create Account</span><i class="fa-solid fa-user-plus"></i>';
                }
            } catch(err) {
                showError('Connection error. Please try again.');
                btn.disabled = false;
                btn.innerHTML = '<span>Create Account</span><i class="fa-solid fa-user-plus"></i>';
            }
        });

        function showError(msg) {
            const err = document.getElementById('signupError');
            err.style.display = 'block';
            err.querySelector('span').innerText = msg;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function togglePass(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon  = document.getElementById(iconId);
            input.type  = input.type === 'password' ? 'text' : 'password';
            icon.className = input.type === 'password' ? 'fa-solid fa-eye' : 'fa-solid fa-eye-slash';
        }
    </script>

    <!-- Cookie Banner -->
    <div id="cookieBanner" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#0f172a;border-top:1px solid #1e293b;padding:1.25rem 2rem;box-shadow:0 -4px 30px rgba(0,0,0,0.3);">
        <div style="max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:2rem;flex-wrap:wrap;">
            <div style="display:flex;align-items:center;gap:1rem;flex:1;min-width:250px;">
                <div style="width:40px;height:40px;background:rgba(16,185,129,0.1);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                    <i class="fa-solid fa-cookie-bite" style="color:#10b981;font-size:1.1rem;"></i>
                </div>
                <div>
                    <p style="color:white;font-size:0.9rem;font-weight:600;margin:0 0 0.2rem;">We use cookies</p>
                    <p style="color:#94a3b8;font-size:0.8rem;margin:0;">AS Pharmacy uses cookies to enhance your experience.</p>
                </div>
            </div>
            <div style="display:flex;gap:0.75rem;flex-shrink:0;">
                <button onclick="declineCookies()" style="padding:0.6rem 1.25rem;border:1px solid #334155;background:transparent;color:#94a3b8;border-radius:8px;cursor:pointer;font-size:0.85rem;">Decline</button>
                <button onclick="acceptCookies()" style="padding:0.6rem 1.5rem;border:none;background:#10b981;color:white;border-radius:8px;cursor:pointer;font-size:0.85rem;font-weight:600;">
                    <i class="fa-solid fa-check" style="margin-right:0.4rem;"></i> Accept All Cookies
                </button>
            </div>
        </div>
    </div>
    <script>
        (function() {
            if (!localStorage.getItem('cookieConsent')) {
                setTimeout(() => { document.getElementById('cookieBanner').style.display = 'block'; }, 1000);
            }
        })();
        function acceptCookies() { localStorage.setItem('cookieConsent','accepted'); hideBanner(); }
        function declineCookies() { localStorage.setItem('cookieConsent','declined'); hideBanner(); }
        function hideBanner() {
            const b = document.getElementById('cookieBanner');
            b.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
            b.style.transform = 'translateY(100%)';
            b.style.opacity = '0';
            setTimeout(() => b.style.display = 'none', 300);
        }
    </script>
</body>
</html>
