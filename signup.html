<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - AS Pharmacy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="auth-logo-icon"><i class="fa-solid fa-briefcase-medical"></i></div>
                <div class="auth-logo-text">AS Pharmacy</div>
            </div>
            <div class="auth-header">
                <h2 class="auth-title">Create Account</h2>
                <p class="auth-subtitle">Join us to manage your pharmacy efficiently</p>
            </div>
            <form id="signupForm">
                <div id="signupError" style="color: var(--danger); font-size: 0.85rem; margin-bottom: 1rem; display: none; text-align: center; background: rgba(239,68,68,0.08); padding: 0.75rem; border-radius: 8px;">
                    <i class="fa-solid fa-circle-exclamation"></i> <span></span>
                </div>
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label class="form-label">Full Name</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-user input-icon"></i>
                            <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-envelope input-icon"></i>
                            <input type="email" id="email" class="form-control" placeholder="name@company.com" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Phone Number</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-phone input-icon"></i>
                            <input type="tel" id="phone" class="form-control" placeholder="+92 300 1234567" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Date of Birth</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-calendar input-icon"></i>
                            <input type="date" id="dob" class="form-control" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock input-icon"></i>
                            <input type="password" id="password" class="form-control" placeholder="Min. 6 characters" required minlength="6">
                        </div>
                    </div>
                    <div class="form-group full-width" style="margin-bottom: 1.5rem;">
                        <label class="form-label">Confirm Password</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-shield-halved input-icon"></i>
                            <input type="password" id="confirmPassword" class="form-control" placeholder="Repeat password" required>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" id="signupBtn">
                    <span>Create Account</span>
                    <i class="fa-solid fa-user-plus"></i>
                </button>
            </form>
            <div class="auth-footer">
                Already have an account? <a href="login.html" class="auth-link">Sign In</a>
            </div>
        </div>
    </div>

    <script src="assets/js/storage.js"></script>
    <script src="assets/js/components.js"></script>
    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm  = document.getElementById('confirmPassword').value;

            if (password !== confirm) {
                showError('Passwords do not match');
                return;
            }

            const btn = document.getElementById('signupBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Creating...';

            const result = await _api('auth.php', 'POST', {
                name:     document.getElementById('name').value,
                email:    document.getElementById('email').value,
                phone:    document.getElementById('phone').value,
                dob:      document.getElementById('dob').value,
                password: password
            }, { action: 'register' });

            if (result.success) {
                alert('Account created successfully! Please login.');
                window.location.href = 'login.html';
            } else {
                showError(result.message || 'Registration failed');
                btn.disabled = false;
                btn.innerHTML = '<span>Create Account</span><i class="fa-solid fa-user-plus"></i>';
            }
        });

        function showError(msg) {
            const err = document.getElementById('signupError');
            err.style.display = 'block';
            err.querySelector('span').innerText = msg;
        }
    </script>
</body>
</html>
