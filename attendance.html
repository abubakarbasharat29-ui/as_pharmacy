<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance - AS Pharmacy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="app-container">
        <div class="main-wrapper">
            <main class="content-area" style="max-width: 1000px; margin: 0 auto;">
                <div style="display: flex; justify-content: flex-end; margin-bottom: 1rem;">
                    <button class="btn btn-outline" style="padding: 0.6rem 1.2rem; font-size: 0.85rem;" onclick="window.print()">
                        <i class="fa-solid fa-print"></i> Print Report
                    </button>
                </div>

                <!-- Time & Stats Row -->
                <div style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 1.5rem; margin-bottom: 2rem;">
                    <div class="card" style="display:flex;flex-direction:column;justify-content:center;align-items:center;background:linear-gradient(135deg,var(--primary) 0%,#1e293b 100%);color:white;border:none;padding:2.5rem;">
                        <div id="liveTime" style="font-size:4rem;font-weight:800;letter-spacing:-2px;line-height:1;">00:00:00</div>
                        <div id="liveDate" style="font-size:1.25rem;opacity:0.8;font-weight:500;margin-top:0.5rem;">Monday, 01 January</div>
                    </div>
                    <div class="card" style="display:flex;flex-direction:column;justify-content:center;align-items:center;padding:1.5rem;">
                        <div style="text-align:center;">
                            <div style="width:50px;height:50px;background:rgba(16,185,129,0.1);color:#10b981;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.25rem;margin:0 auto 1rem;">
                                <i class="fa-solid fa-user-check"></i>
                            </div>
                            <span style="font-weight:700;color:var(--text-muted);font-size:0.9rem;text-transform:uppercase;letter-spacing:0.05em;">Today Present</span>
                            <div id="todayBadge" style="font-size:3rem;font-weight:800;color:#10b981;line-height:1;margin-top:0.5rem;">—</div>
                        </div>
                    </div>
                </div>

                <!-- Attendance History -->
                <div class="card" style="border-top:4px solid var(--accent);padding:0;overflow:hidden;">
                    <div style="padding:1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--surface-alt);">
                        <div style="display:flex;align-items:center;gap:0.75rem;">
                            <i class="fa-solid fa-clock-rotate-left" style="color:var(--accent);"></i>
                            <h3 style="font-size:1.25rem;font-weight:800;color:var(--primary);letter-spacing:-0.5px;">Attendance History</h3>
                        </div>
                        <span id="totalCount" class="badge badge-success" style="font-weight:700;padding:0.5rem 1rem;">0 Records Found</span>
                    </div>
                    <div class="table-container">
                        <table style="width:100%;border-collapse:collapse;">
                            <thead>
                                <tr style="background:var(--surface);">
                                    <th style="padding:1.25rem 1.5rem;width:45%;">Staff Member</th>
                                    <th style="padding:1.25rem 1.5rem;text-align:center;width:30%;">Date</th>
                                    <th style="padding:1.25rem 1.5rem;text-align:right;width:25%;">Status</th>
                                </tr>
                            </thead>
                            <tbody id="historyBody">
                                <tr><td colspan="3" style="text-align:center;padding:2rem;color:var(--text-light);">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="assets/js/storage.js"></script>
    <script src="assets/js/components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await Storage.init();
const user = Storage.getCurrentUser();
if (!user) { window.location.replace('index.html'); return; }
window.addEventListener('pageshow', function(event) {
    if (event.persisted) {
        const u = Storage.getCurrentUser();
        if (!u) window.location.replace('index.html');
    }
});
            await Components.renderSidebar('attendance');
            await Components.renderTopbar('Attendance System');
            startClock();
            await renderHistory();
        });

        function startClock() {
            function tick() {
                const now = new Date();
                const timeEl = document.getElementById('liveTime');
                const dateEl = document.getElementById('liveDate');
                if (timeEl) timeEl.innerText = now.toLocaleTimeString([], { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });
                if (dateEl) dateEl.innerText = now.toLocaleDateString([], { weekday: 'long', day: 'numeric', month: 'long' });
            }
            setInterval(tick, 1000);
            tick();
        }

        async function renderHistory() {
            const today   = new Date().toISOString().split('T')[0];
            const logs    = await Storage.fetch(DB.ATTENDANCE);
            const sorted  = [...logs].sort((a, b) => b.id - a.id);
            const todayLogs = logs.filter(l => l.date === today);

            document.getElementById('todayBadge').innerText = todayLogs.length;
            document.getElementById('totalCount').innerText = `${logs.length} Records Found`;

            const body = document.getElementById('historyBody');
            if (sorted.length === 0) {
                body.innerHTML = '<tr><td colspan="3" style="text-align:center;padding:3rem;color:var(--text-light);">No attendance records found</td></tr>';
                return;
            }

            body.innerHTML = sorted.map(l => `
                <tr style="border-bottom:1px solid var(--border);">
                    <td style="padding:1.25rem 1.5rem;">
                        <div style="display:flex;align-items:center;gap:1rem;">
                            <div style="width:38px;height:38px;background:var(--accent-glow);color:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.9rem;border:1px solid var(--accent);">
                                ${(l.userName || l.user_name || '?').charAt(0)}
                            </div>
                            <span style="font-weight:700;color:var(--text);">${l.userName || l.user_name}</span>
                        </div>
                    </td>
                    <td style="padding:1.25rem 1.5rem;text-align:center;font-weight:600;color:var(--text-muted);">
                        ${new Date(l.date).toLocaleDateString([], { day: 'numeric', month: 'short', year: 'numeric' })}
                    </td>
                    <td style="padding:1.25rem 1.5rem;text-align:right;">
                        <span class="badge badge-success" style="padding:0.4rem 1rem;font-size:0.8rem;">Present</span>
                    </td>
                </tr>`).join('');
        }
    </script>
    <!-- COOKIES BANNER -->
<div id="cookieBanner" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#0f172a;border-top:1px solid #1e293b;padding:1.25rem 2rem;box-shadow:0 -4px 30px rgba(0,0,0,0.3);">
    <div style="max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:2rem;flex-wrap:wrap;">
        <div style="display:flex;align-items:center;gap:1rem;flex:1;min-width:250px;">
            <div style="width:40px;height:40px;background:rgba(16,185,129,0.1);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <i class="fa-solid fa-cookie-bite" style="color:#10b981;font-size:1.1rem;"></i>
            </div>
            <div>
                <p style="color:white;font-size:0.9rem;font-weight:600;margin:0 0 0.2rem;">We use cookies</p>
                <p style="color:#94a3b8;font-size:0.8rem;margin:0;">AS Pharmacy uses cookies to enhance your experience and keep you logged in securely.</p>
            </div>
        </div>
        <div style="display:flex;gap:0.75rem;flex-shrink:0;">
            <button onclick="declineCookies()" style="padding:0.6rem 1.25rem;border:1px solid #334155;background:transparent;color:#94a3b8;border-radius:8px;cursor:pointer;font-size:0.85rem;font-weight:500;">Decline</button>
            <button onclick="acceptCookies()" style="padding:0.6rem 1.5rem;border:none;background:#10b981;color:white;border-radius:8px;cursor:pointer;font-size:0.85rem;font-weight:600;">
                <i class="fa-solid fa-check" style="margin-right:0.4rem;"></i> Accept All Cookies
            </button>
        </div>
    </div>
</div>
<script>
(function() {
    if (!localStorage.getItem('cookieConsent')) {
        setTimeout(() => { document.getElementById('cookieBanner').style.display = 'block'; }, 1000);
    }
})();
function acceptCookies() { localStorage.setItem('cookieConsent','accepted'); hideBanner(); }
function declineCookies() { localStorage.setItem('cookieConsent','declined'); hideBanner(); }
function hideBanner() {
    const b = document.getElementById('cookieBanner');
    b.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
    b.style.transform = 'translateY(100%)';
    b.style.opacity = '0';
    setTimeout(() => b.style.display = 'none', 300);
}
</script>
<script src="assets/js/chatbot.js"></script>
</body>
</html>
