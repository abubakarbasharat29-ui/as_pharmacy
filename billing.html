<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing - AS Pharmacy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="app-container">
        <div class="main-wrapper">
            <main class="content-area">
                <div style="display: grid; grid-template-columns: 1fr 380px; gap: 1.5rem;">
                    <!-- Billing Form -->
                    <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                        <div class="card">
                            <h3 style="margin-bottom: 1.5rem;">Create New Bill</h3>
                            <div style="display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 1rem; align-items: end;">
                                <div class="form-group" style="margin-bottom: 0;">
                                    <label class="form-label">Select Medicine</label>
                                    <select id="medSelect" class="form-control" style="padding-left: 1rem;" onchange="updatePrice()">
                                        <option value="">-- Search Medicine --</option>
                                    </select>
                                </div>
                                <div class="form-group" style="margin-bottom: 0;">
                                    <label class="form-label">Price (Rs.)</label>
                                    <input type="number" id="itemPrice" class="form-control" style="padding-left: 1rem;" readonly>
                                </div>
                                <div class="form-group" style="margin-bottom: 0;">
                                    <label class="form-label">Quantity</label>
                                    <input type="number" id="itemQty" class="form-control" style="padding-left: 1rem;" value="1" min="1">
                                </div>
                                <button class="btn btn-primary" onclick="addItem()">
                                    <i class="fa-solid fa-plus"></i>
                                </button>
                            </div>
                        </div>

                        <div class="card" style="padding: 0; overflow: hidden; flex: 1;">
                            <div class="table-container">
                                <table>
                                    <thead>
                                        <tr><th>Medicine</th><th>Price</th><th>Qty</th><th>Total</th><th style="width:50px;"></th></tr>
                                    </thead>
                                    <tbody id="billItemsBody"></tbody>
                                </table>
                            </div>
                            <div id="emptyState" style="padding: 3rem; text-align: center; color: var(--text-light);">
                                <i class="fa-solid fa-cart-shopping" style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.2;"></i>
                                <p>No items added to the bill yet.</p>
                            </div>
                        </div>
                    </div>

                    <!-- Summary Sidebar -->
                    <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                        <div class="card">
                            <h3 style="margin-bottom: 1.5rem;">Bill Summary</h3>
                            <div class="form-group">
                                <label class="form-label">Customer Name</label>
                                <input type="text" id="custName" class="form-control" style="padding-left: 1rem;" placeholder="Walk-in Patient">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Discount (%)</label>
                                <input type="number" id="discount" class="form-control" style="padding-left: 1rem;" value="0" min="0" max="100" oninput="calculateTotal()">
                            </div>
                            <div style="margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:1rem;">
                                <div style="display:flex;justify-content:space-between;font-size:0.95rem;">
                                    <span style="color:var(--text-muted);">Subtotal</span><span id="subtotal">Rs. 0</span>
                                </div>
                                <div style="display:flex;justify-content:space-between;font-size:0.95rem;">
                                    <span style="color:var(--text-muted);">Discount</span><span id="discountAmt" style="color:var(--danger);">- Rs. 0</span>
                                </div>
                                <div style="display:flex;justify-content:space-between;font-size:1.25rem;font-weight:800;margin-top:0.5rem;color:var(--accent);">
                                    <span>Total</span><span id="totalAmount">Rs. 0</span>
                                </div>
                            </div>
                            <div style="display:flex;flex-direction:column;gap:0.75rem;margin-top:2rem;">
                                <button class="btn btn-primary" onclick="processBill()" id="btnProcess">
                                    <i class="fa-solid fa-receipt"></i> Process & Print
                                </button>
                                <button class="btn btn-outline" onclick="clearBill()">
                                    <i class="fa-solid fa-trash"></i> Clear All
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="assets/js/storage.js"></script>
    <script src="assets/js/components.js"></script>
    <script>
        let billItems = [];
        let _allMeds = [];

        document.addEventListener('DOMContentLoaded', async () => {
            await Storage.init();
const user = Storage.getCurrentUser();
if (!user) { window.location.replace('index.html'); return; }
window.addEventListener('pageshow', function(event) {
    if (event.persisted) {
        const u = Storage.getCurrentUser();
        if (!u) window.location.replace('index.html');
    }
});
            await Components.renderSidebar('billing');
            await Components.renderTopbar('Billing System');
            await populateMeds();
        });

        async function populateMeds() {
            _allMeds = await Storage.fetch(DB.MEDS);
            const meds = _allMeds.filter(m => m.qty > 0);
            const select = document.getElementById('medSelect');
            select.innerHTML = '<option value="">-- Search Medicine --</option>' +
                meds.map(m => `<option value="${m.id}" data-price="${m.price}">${m.name} (${m.qty} available)</option>`).join('');
        }

        function updatePrice() {
            const select = document.getElementById('medSelect');
            const price  = select.options[select.selectedIndex]?.dataset.price;
            document.getElementById('itemPrice').value = price || '';
        }

        function addItem() {
            const select = document.getElementById('medSelect');
            const id     = select.value;
            if (!id) return;

            const inventoryMed = _allMeds.find(m => m.id == id);
            const qty = parseInt(document.getElementById('itemQty').value) || 1;
            const currentInBill = billItems.find(i => i.id == id)?.qty || 0;

            if (inventoryMed.qty < currentInBill + qty) {
                alert(`OUT OF STOCK: Only ${inventoryMed.qty} units available in inventory.`);
                return;
            }

            const name  = select.options[select.selectedIndex].text.split(' (')[0];
            const price = parseFloat(document.getElementById('itemPrice').value);
            const existing = billItems.find(i => i.id == id);

            if (existing) {
                existing.qty += qty;
                existing.total = existing.qty * existing.price;
            } else {
                billItems.push({ id, name, price, qty, total: price * qty });
            }

            renderBillItems();
            calculateTotal();
            select.value = '';
            document.getElementById('itemPrice').value = '';
            document.getElementById('itemQty').value = 1;
        }

        function removeItem(index) { billItems.splice(index, 1); renderBillItems(); calculateTotal(); }

        function renderBillItems() {
            const tbody = document.getElementById('billItemsBody');
            const empty = document.getElementById('emptyState');
            if (billItems.length === 0) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
            empty.style.display = 'none';
            tbody.innerHTML = billItems.map((item, i) => `
                <tr>
                    <td><strong>${item.name}</strong></td>
                    <td>Rs. ${item.price}</td>
                    <td>${item.qty}</td>
                    <td style="font-weight:700;">Rs. ${item.total}</td>
                    <td><button class="action-btn" onclick="removeItem(${i})" style="color:var(--danger);"><i class="fa-solid fa-xmark"></i></button></td>
                </tr>`).join('');
        }

        function calculateTotal() {
            const subtotal = billItems.reduce((a, i) => a + i.total, 0);
            const disc     = parseFloat(document.getElementById('discount').value) || 0;
            const discAmt  = (subtotal * disc) / 100;
            const total    = subtotal - discAmt;
            document.getElementById('subtotal').innerText    = `Rs. ${subtotal.toLocaleString()}`;
            document.getElementById('discountAmt').innerText = `- Rs. ${discAmt.toLocaleString()}`;
            document.getElementById('totalAmount').innerText = `Rs. ${total.toLocaleString()}`;
        }

        function clearBill() {
            if (confirm('Clear all items from the current bill?')) {
                billItems = [];
                document.getElementById('custName').value  = '';
                document.getElementById('discount').value  = 0;
                renderBillItems();
                calculateTotal();
            }
        }

        async function processBill() {
            if (billItems.length === 0) { alert('Please add at least one item to the bill.'); return; }

            const btn = document.getElementById('btnProcess');
            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';

            const subtotal = billItems.reduce((a, i) => a + i.total, 0);
            const discP    = parseFloat(document.getElementById('discount').value) || 0;
            const discAmt  = (subtotal * discP) / 100;
            const total    = subtotal - discAmt;

            const sale = {
                customer: document.getElementById('custName').value || 'Walk-in Patient',
                items:    [...billItems],
                subtotal,
                discount: discAmt,
                total,
                date:     new Date().toISOString().split('T')[0],
                time:     new Date().toLocaleTimeString()
            };

            await Storage.add(DB.SALES, sale);

            alert('Bill processed successfully!');
            billItems = [];
            renderBillItems();
            calculateTotal();
            document.getElementById('custName').value = '';
            await populateMeds();

            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-receipt"></i> Process & Print';
        }
    </script>
    <!-- COOKIES BANNER -->
<div id="cookieBanner" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#0f172a;border-top:1px solid #1e293b;padding:1.25rem 2rem;box-shadow:0 -4px 30px rgba(0,0,0,0.3);">
    <div style="max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:2rem;flex-wrap:wrap;">
        <div style="display:flex;align-items:center;gap:1rem;flex:1;min-width:250px;">
            <div style="width:40px;height:40px;background:rgba(16,185,129,0.1);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <i class="fa-solid fa-cookie-bite" style="color:#10b981;font-size:1.1rem;"></i>
            </div>
            <div>
                <p style="color:white;font-size:0.9rem;font-weight:600;margin:0 0 0.2rem;">We use cookies</p>
                <p style="color:#94a3b8;font-size:0.8rem;margin:0;">AS Pharmacy uses cookies to enhance your experience and keep you logged in securely.</p>
            </div>
        </div>
        <div style="display:flex;gap:0.75rem;flex-shrink:0;">
            <button onclick="declineCookies()" style="padding:0.6rem 1.25rem;border:1px solid #334155;background:transparent;color:#94a3b8;border-radius:8px;cursor:pointer;font-size:0.85rem;font-weight:500;">Decline</button>
            <button onclick="acceptCookies()" style="padding:0.6rem 1.5rem;border:none;background:#10b981;color:white;border-radius:8px;cursor:pointer;font-size:0.85rem;font-weight:600;">
                <i class="fa-solid fa-check" style="margin-right:0.4rem;"></i> Accept All Cookies
            </button>
        </div>
    </div>
</div>
<script>
(function() {
    if (!localStorage.getItem('cookieConsent')) {
        setTimeout(() => { document.getElementById('cookieBanner').style.display = 'block'; }, 1000);
    }
})();
function acceptCookies() { localStorage.setItem('cookieConsent','accepted'); hideBanner(); }
function declineCookies() { localStorage.setItem('cookieConsent','declined'); hideBanner(); }
function hideBanner() {
    const b = document.getElementById('cookieBanner');
    b.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
    b.style.transform = 'translateY(100%)';
    b.style.opacity = '0';
    setTimeout(() => b.style.display = 'none', 300);
}
</script>
</body>
</html>
